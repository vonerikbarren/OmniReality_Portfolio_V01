<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⟐mniReality</title>

  <script type="importmap">
  {
    "imports": {
      "three":          "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
      "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/",
      "gsap":           "https://cdn.jsdelivr.net/npm/gsap@3.12.5/index.js"
    }
  }
  </script>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Courier New', Courier, monospace;
    }

    /* ── Canvas ───────────────────────────────────────────── */
    #omni-canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* ── UI Shell (overlay — Phase 3) ────────────────────── */
    #omni-ui {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;   /* canvas stays interactive through it */
      z-index: 10;
    }

    /* ── Boot screen ─────────────────────────────────────── */
    #omni-boot {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      z-index: 100;
      transition: opacity 1.2s ease;
    }

    #omni-boot.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .boot-glyph {
      color: #fff;
      font-size: clamp(2rem, 6vw, 4rem);
      letter-spacing: 0.15em;
      opacity: 0;
      animation: bootPulse 1.8s ease forwards;
    }

    @keyframes bootPulse {
      0%   { opacity: 0; transform: scale(0.92); }
      50%  { opacity: 1; transform: scale(1);    }
      100% { opacity: 0.6; transform: scale(1);  }
    }
  </style>
</head>
<body>

  <!-- Boot screen — fades once scene is ready -->
  <div id="omni-boot">
    <span class="boot-glyph">⟐mniReality</span>
  </div>

  <!-- WebGL canvas -->
  <canvas id="omni-canvas"></canvas>

  <!-- UI overlay shell — populated in Phase 3 -->
  <div id="omni-ui"></div>

  <!-- Entry point -->
  <script type="module" src="./main.js"></script>

</body>
</html>
